 function searchRequests() {
  const keyword = document
    .getElementById("searchInput")
    .value.toLowerCase();

  const filtered = requestsData.filter((r) =>
    r.equipment_title.toLowerCase().includes(keyword) ||
    r.patient_name.toLowerCase().includes(keyword) ||
    r.equipment_phone.toLowerCase().includes(keyword)
  );

  renderTable(filtered);
}
  async function loadRequests() {
  const res = await fetch(`${API_BASE}/request-equipment/all`);
  const data = await res.json();

  requestsData = data; // store data
  renderTable(data);
}
function renderTable(data) {
  const table = document.getElementById("requestTable");
  table.innerHTML = "";

  if (!data.length) {
    table.innerHTML = `
      <tr>
        <td colspan="8" class="text-center text-muted">
          No requests found
        </td>
      </tr>
    `;
    return;
  }

  data.forEach((r) => {
    const statusBadge = r.status
      ? `<span class="badge bg-success">Approved</span>`
      : `<span class="badge bg-warning text-dark">Pending</span>`;

    const actionBtn = r.status
      ? `<button class="btn btn-sm btn-secondary" disabled>Approved</button>`
      : `<button class="btn btn-sm btn-success"
            onclick="approveRequest('${r.id}')">
            Approve
         </button>`;

    table.innerHTML += `
      <tr>

        <td>
          <img src="${r.equipment_image}"
               width="55"
               height="55"
               class="rounded shadow-sm object-fit-cover">
        </td>

        <td class="fw-semibold">${r.equipment_title}</td>

        <td>${r.patient_name}</td>
        <td>${r.equipment_phone}</td>
        <td>${r.equipment_price}</td>
        <td>${r.ward}</td>
        <td>${statusBadge}</td>

        <td>${actionBtn}</td>

      </tr>
    `;
  });
}
  //////////////////////////////////////////////////////
  // APPROVE REQUEST
  //////////////////////////////////////////////////////
  async function approveRequest(id) {
    if (!confirm("Approve this request?")) return;

    await fetch(`${API_BASE}/request-equipment/approve/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: true }),
    });

    loadRequests(); // refresh
  }

  //////////////////////////////////////////////////////

  loadRequests();
