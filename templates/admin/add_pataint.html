{% extends "admin/base.html" %}
{% block title %}Create Patient{% endblock %}
{% block content %}

<div class="card p-3 mb-4">
  <h4>Create Patient</h4>
  <p class="text-muted">Patient registration</p>
</div>

<form id="patientForm" class="card p-4">

  <!-- hidden -->
  <input type="hidden" id="documents" />

  <h5 class="mb-3">Basic Details</h5>
  <div class="row">

    <div class="col-md-4 mb-3">
      <label>Name *</label>
      <input class="form-control" id="name" required />
    </div>

    <div class="col-md-4 mb-3">
      <label>Father Name</label>
      <input class="form-control" id="father_name" />
    </div>

    <div class="col-md-4 mb-3">
      <label>Phone *</label>
      <input class="form-control" id="phone" required />
    </div>

    <div class="col-md-4 mb-3">
      <label>Emergency Phone</label>
      <input class="form-control" id="other_number" />
    </div>

    <div class="col-md-4 mb-3">
      <label>Email</label>
      <input class="form-control" id="email" />
    </div>

    <div class="col-md-4 mb-3">
      <label>Age</label>
      <input type="number" class="form-control" id="age" />
    </div>

    <div class="col-md-4 mb-3">
      <label>Gender</label>
      <select class="form-control" id="gender">
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <div class="col-md-4 mb-3">
      <label>Hospital</label>
      <select class="form-control" id="hospital">
        <option value="">Select Hospital</option>
        {% for h in hospitals %}
        <option value="{{ h.id }}">{{ h.name }} ({{ h.branch }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="col-md-4 mb-3">
      <label>Service Start Date</label>
      <input type="date" class="form-control" id="service_start" />
    </div>

    <div class="col-md-4 mb-3">
      <label>Service End Date</label>
      <input type="date" class="form-control" id="service_end" />
    </div>

     <div class="col-md-4 mb-3">
      <label>City *</label>
      <input class="form-control" id="city" required />
    </div>

    <div class="col-md-4 mb-3">
      <label>State *</label>
      <input class="form-control" id="state" required />
    </div>

    <div class="col-md-4 mb-3">
      <label>Pincode *</label>
      <input class="form-control" id="pincode" required />
    </div>

    <div class="col-md-4 mb-3">
      <label>Documents</label>
      <input
        type="file"
        multiple
        class="form-control"
        onchange="uploadMultipleFiles(this)"
      />
    </div>
    <div class="col-md-4 mb-3">
  <label>Aadhar Card</label>
  <input
    type="file"
    class="form-control"
    onchange="uploadAadhar(this)"
  />
  <input type="hidden" id="adharcard" />
</div>

    <div class="col-md-12 mb-3">
      <label>Address</label>
      <textarea class="form-control" id="address"></textarea>
    </div>

    <div class="col-md-12 mb-3">
      <label>Medical History</label>
      <textarea class="form-control" id="medical_history"></textarea>
    </div>



    <div class="col-md-6 mb-3">
      <label>Assign Doctor</label>
      <select class="form-control" id="assigned_doctor">
        <option value="">Not Assigned</option>
        {% for d in doctors %}
        <option value="{{ d.id }}">
          Dr. {{ d.user.name }} ({{ d.specialization }})
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6 mb-3">
      <label>Assign Caretaker</label>
      <select id="assigned_caretaker" class="form-select">
        {% for n in nurses %}
        <option value="{{ n.id }}">
          {{ n.user.name }} ({{ n.nurse_type }})
        </option>
        {% endfor %}
      </select>
    </div>

  </div>

  <div class="text-end">
    <button class="btn btn-success px-4">Create Patient</button>
  </div>
</form>

<!-- EQUIPMENT MODAL -->
<div id="equipmentPopup" class="popup-overlay">

  <div class="popup-card">

    <div class="popup-header">
      <h5>Assign Equipment</h5>
      <button onclick="skipEquipment()">✕</button>
    </div>

    <div class="popup-body">

    <table class="table table-bordered">

    <thead>
    <tr>
    <th>Equipment</th>
    <th>Days</th>
    <th width="80">Action</th>
    </tr>
    </thead>

    <tbody id="equipmentRows"></tbody>

    </table>

    <button type="button" class="btn btn-sm btn-primary" onclick="addRow()">
    + Add Row
    </button>

    </div>
    <div class="popup-footer">
      <button class="btn btn-secondary" onclick="skipEquipment()">Skip</button>
      <button class="btn btn-success" onclick="submitEquipment()">Submit</button>
    </div>

  </div>

</div>

<style>
.popup-overlay{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-card{
  background:white;
  width:700px;
  max-height:80vh;
  overflow:auto;
  border-radius:10px;
  padding:20px;
}

.popup-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.popup-footer{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:20px;
}
</style>
<script>

  
const FILE_API = "/upload/file";
const CREATE_API = "/patient/create";
let equipmentOptions = [];

/* ---------- FILE UPLOAD ---------- */
async function uploadMultipleFiles(input) {
  const paths = [];
  for (const file of input.files) {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("folder", "documents");

    const res = await fetch(FILE_API, {
      method: "POST",
      headers: { Authorization: headers().Authorization },
      body: fd
    });

    const data = await res.json();
    if (res.ok) paths.push(data.path);
  }
  document.getElementById("documents").value = JSON.stringify(paths);
}

async function uploadAadhar(input) {
  const file = input.files[0];
  if (!file) return;

  const fd = new FormData();
  fd.append("file", file);
  fd.append("folder", "aadhar");

  const res = await fetch(FILE_API, {
    method: "POST",
    headers: { Authorization: headers().Authorization },
    body: fd
  });

  const data = await res.json();

  if (res.ok) {
    document.getElementById("adharcard").value = data.path;
  }
}

/* ---------- SUBMIT ---------- */
document.getElementById("patientForm").onsubmit = async (e) => {
  e.preventDefault();

  const payload = {
  name: document.getElementById("name").value.trim(),
  phone: document.getElementById("phone").value.trim(),
  father_name: document.getElementById("father_name").value || null,
  other_number: document.getElementById("other_number").value || null,
  email: document.getElementById("email").value || null,
  age: document.getElementById("age").value || null,
  gender: document.getElementById("gender").value || null,
  city: document.getElementById("city").value || null,
  state: document.getElementById("state").value || null,
  pincode: document.getElementById("pincode").value || null,
  address: document.getElementById("address").value || null,
  medical_history: document.getElementById("medical_history").value || null,
  service_start: document.getElementById("service_start").value || null,
  service_end: document.getElementById("service_end").value || null,
  hospital: document.getElementById("hospital").value || null,
  assigned_doctor: document.getElementById("assigned_doctor").value || null,
  assigned_caretaker: document.getElementById("assigned_caretaker").value
    ? [document.getElementById("assigned_caretaker").value]
    : [],
  documents: document.getElementById("documents").value
    ? JSON.parse(document.getElementById("documents").value)
    : [],
  adharcard: document.getElementById("adharcard").value || null
};

  console.log("📦 PAYLOAD:", payload);

const res = await fetch(CREATE_API, {
  method: "POST",
  headers: {
    ...headers(),
    "Content-Type": "application/json"
  },
  body: JSON.stringify(payload)
});

  const data = await res.json();

if (res.ok) {

  createdPatientId = data.patient_id; // patient id

  await loadEquipments();

document.getElementById("equipmentPopup").style.display = "flex";
} else {
    alert(data.detail || "Error creating patient");
  }
};


async function loadEquipments(){

  const res = await fetch("/equipment/equipment-getall");
  const data = await res.json();

  equipmentOptions = data;

  document.getElementById("equipmentRows").innerHTML = "";

  addRow(); // default row

}
function equipmentDropdown(){

  let options = `<option value="">Select Equipment</option>`;

  equipmentOptions.forEach(e=>{
    options += `<option value="${e.id}">${e.title}</option>`;
  });

  return options;
}


function addRow(){

  const row = `
  <tr>

    <td>
      <select class="form-control equipment-select">
        ${equipmentDropdown()}
      </select>
    </td>

    <td>
      <input type="number"
        class="form-control duration-input"
        value="1"
        min="1"
      >
    </td>

    <td class="text-center">
      <button class="btn btn-danger btn-sm"
        onclick="removeRow(this)">
        ✕
      </button>
    </td>

  </tr>
  `;

  document
    .getElementById("equipmentRows")
    .insertAdjacentHTML("beforeend", row);

}


function removeRow(btn){
  btn.closest("tr").remove();
}
function skipEquipment(){
  document.getElementById("equipmentPopup").style.display = "none";
  window.location.href = "/admin/patients";
}

async function submitEquipment(){

  const rows = document.querySelectorAll("#equipmentRows tr");

  const equipments = [];

  rows.forEach(r => {

    const eq = r.querySelector(".equipment-select").value;
    const days = r.querySelector(".duration-input").value;

    if(eq){
      equipments.push({
        equipment_id: eq,
        day_duration: parseInt(days)
      });
    }

  });

  if(equipments.length === 0){
    alert("Select at least one equipment");
    return;
  }

  await fetch("/patient/assign-equipment",{
    method:"POST",
    headers:{
      ...headers(),
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      patient_id: createdPatientId,
      equipments: equipments
    })
  });

  alert("Equipment assigned");

  window.location.href="/admin/patients";

}

</script>

{% endblock %}
